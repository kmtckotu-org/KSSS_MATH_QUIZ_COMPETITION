<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Math Quiz Bracket — KSSS</title>
  <meta property="og:title"       content="KSSS Math Quiz Competition — Live Scores & Schedules">
  <meta property="og:description" content="Follow the official live bracket and results for the Kotu Senior Secondary School Mathematics Quiz Competition.">
  <meta property="og:image"       content="https://kmtc-org.github.io/KSSS_MATH_QUIZ_COMPETITION-now/static/images/KMTC.webp?v=2.2.23">
  <meta property="og:image:type"  content="image/webp">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt"   content="KSSS Maths & Tech Club (KMTC) — Math Quiz Competition">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://kmtc-org.github.io/KSSS_MATH_QUIZ_COMPETITION-now/bracket.html">
  <link rel="icon" type="image/png" href="static/images/Kotu-sss_logo.png">
  <script>
    (function() {
      const key = "ksss-user-theme";
      const saved = localStorage.getItem(key);
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <!-- Prefetch grade data for instant tab switching -->
  <link rel="prefetch" href="data/competition-grade10.json" as="fetch" crossorigin>
  <link rel="prefetch" href="data/competition-grade11.json" as="fetch" crossorigin>
  <link rel="prefetch" href="data/competition-grade12.json" as="fetch" crossorigin>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="user/app.css">
</head>
<body>
  <div id="page-transition"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <img
          src="static/images/Kotu-sss_logo.png"
          alt="KSSS Logo"
          class="brand-logo"
          loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="brand-logo-fallback" style="display:none;">KSSS</div>
        <span class="brand-name">KOTU SENIOR SECONDARY SCHOOL</span>
      </div>
      <div class="header-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle dark mode">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Nav Tabs (grade links — active state set by app.js) -->
  <nav class="tab-nav" aria-label="Grade navigation">
    <ul class="tab-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="bracket.html?grade=10" data-grade="10">Grade 10</a></li>
      <li><a href="bracket.html?grade=11" data-grade="11">Grade 11</a></li>
      <li><a href="bracket.html?grade=12" data-grade="12">Grade 12</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main">

    <a href="index.html" class="back-btn">← Back to Home</a>

    <h1 id="page-title" style="font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:20px;">
      Math Quiz Competition
    </h1>

    <div id="bracket-container"></div>

  </main>


  <!-- Footer -->
  <footer class="site-footer">
    <p>
      © 2026 KSSS Maths &amp; Tech Club. All rights reserved. |
      <a href="https://kmtc-org.github.io/KMTC--website/" target="_blank" rel="noopener">Official Website</a>
    </p>
  </footer>

  <script src="user/app.js" defer></script>
</body>
</html>
